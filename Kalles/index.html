<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kalles</title>
  <style>
    /* Completely Hide Google Translate Toolbar */
    iframe.goog-te-banner-frame {
      display: none !important;
    }
    .goog-te-banner-frame {
      display: none !important;
    }
    body {
      top: 0px !important;
      position: static !important;
    }
    html {
      top: 0px !important;
      position: static !important;
    }
    #goog-gt-tt {
      display: none !important;
    }
    .goog-tooltip, .goog-tooltip:hover {
      display: none !important;
    }
    .goog-text-highlight {
      background-color: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
  </style>
</head>

<body>
  <div id="google_translate_element" style="display:none;"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en', 
        includedLanguages: 'en,zh-CN,ar,fr,es,de',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }

    // Force hide Google Translate banner and fix body offset
    setInterval(function(){
      var iframes = document.getElementsByTagName('iframe');
      for (var i = 0; i < iframes.length; i++) {
        var cls = iframes[i].className || '';
        if (cls.indexOf('goog-te-banner-frame') !== -1 || iframes[i].src.indexOf('translate.google.com') !== -1) {
          iframes[i].style.display = 'none';
          iframes[i].style.visibility = 'hidden';
          iframes[i].style.height = '0px';
          var parent = iframes[i].parentNode;
          if (parent && parent.className.indexOf('skiptranslate') !== -1) {
            parent.style.display = 'none';
            parent.style.height = '0px';
          }
        }
      }
      if (document.body) {
         document.body.style.top = '0px';
         document.body.style.position = 'static';
         document.body.style.marginTop = '0px';
      }
      if (document.documentElement) {
         document.documentElement.style.top = '0px';
         document.documentElement.style.position = 'static';
         document.documentElement.style.marginTop = '0px';
      }
    }, 50);
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
